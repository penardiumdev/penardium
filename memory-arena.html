<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Memory Arena</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; overflow: hidden; background: #1a1a1d; font-family: 'JetBrains Mono', monospace; }
  canvas { display: block; cursor: none; position: fixed; inset: 0; }
  .nav-link {
    position: fixed;
    top: 16px;
    left: 50%;
    transform: translateX(-50%);
    color: #6b6b68;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 400;
    text-decoration: none;
    letter-spacing: 0.5px;
    z-index: 10;
    cursor: none;
    transition: color 0.15s;
  }
  .nav-link:hover { color: #e8e8e6; }
</style>
</head>
<body>
<a href="https://penardium.com/dodge-arena.html" class="nav-link">TRY PENARDIUM DODGE ARENA →</a>
<canvas id="arena"></canvas>
<script>
const canvas = document.getElementById('arena');
const ctx = canvas.getContext('2d');

// --- config ---
const ARENA_SIZE = 300;
const DOT_R = 4;
const RING_R = 18;
const BG = '#1a1a1d', FG = '#e8e8e6', DIM = '#6b6b68';

const NUM_CIRCLES = 7;
const CIRCLE_R = 18;
const MIN_SPACING = 50; // center-to-center distance between circles
const MEMORIZE_MS = 5000;

// --- state ---
let W, H, ax, ay, DPR = 1;
let rawX = -1, rawY = -1;
let dx_ = -1, dy_ = -1;
let rx = -1, ry = -1;
let mode = 'idle'; // idle | countdown | memorize | recall | done | dead
let tCountdown = 0, tMemorizeStart = 0, tRecallStart = 0;
let circles = []; // {x, y, n}
let nextNumber = 1;
let finalTime = 0;
let best = parseFloat(localStorage.getItem('memoryArenaBest')) || 0; // 0 = no record yet

function resize() {
  DPR = devicePixelRatio || 1;
  W = innerWidth; H = innerHeight;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  canvas.width = W * DPR;
  canvas.height = H * DPR;
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  ax = (W - ARENA_SIZE) / 2;
  ay = (H - ARENA_SIZE) / 2;
}
addEventListener('resize', resize);
resize();

canvas.addEventListener('mousemove', e => {
  rawX = e.clientX; rawY = e.clientY;
  if (dx_ < 0) { dx_ = rawX; dy_ = rawY; rx = rawX; ry = rawY; }
});
canvas.addEventListener('contextmenu', e => e.preventDefault());

const inArena = () => rx >= ax && rx <= ax + ARENA_SIZE && ry >= ay && ry <= ay + ARENA_SIZE;

function generateCircles() {
  circles = [];
  const padding = CIRCLE_R + 4;
  let attempts = 0;
  while (circles.length < NUM_CIRCLES && attempts < 5000) {
    attempts++;
    const cx = ax + padding + Math.random() * (ARENA_SIZE - padding * 2);
    const cy = ay + padding + Math.random() * (ARENA_SIZE - padding * 2);
    let ok = true;
    for (const c of circles) {
      if (Math.hypot(cx - c.x, cy - c.y) < MIN_SPACING) { ok = false; break; }
    }
    if (ok) circles.push({ x: cx, y: cy, n: circles.length + 1 });
  }
}

function startGame() {
  generateCircles();
  nextNumber = 1;
  finalTime = 0;
  mode = 'memorize';
  tMemorizeStart = performance.now();
}

function gameOver() {
  mode = 'dead';
}

function finish(now) {
  finalTime = (now - tRecallStart) / 1000;
  if (best === 0 || finalTime < best) {
    best = finalTime;
    localStorage.setItem('memoryArenaBest', best);
  }
  mode = 'done';
}

canvas.addEventListener('click', () => {
  if (mode === 'countdown' && inArena()) {
    startGame();
    return;
  }
  if (mode === 'recall') {
    // check if click hit the next-numbered circle
    for (const c of circles) {
      if (c.n < nextNumber) continue; // already cleared
      if (Math.hypot(dx_ - c.x, dy_ - c.y) < CIRCLE_R) {
        if (c.n === nextNumber) {
          nextNumber++;
          if (nextNumber > NUM_CIRCLES) finish(performance.now());
        } else {
          gameOver();
        }
        return;
      }
    }
    // clicked empty space inside arena during recall — also fail (prevents random clicking)
    if (inArena()) gameOver();
    return;
  }
  if (mode === 'dead' || mode === 'done') {
    mode = 'idle';
    circles = [];
    nextNumber = 1;
  }
});

function text(str, x, y, size, color = FG, weight = 800, align = 'center') {
  ctx.fillStyle = color;
  ctx.font = `${weight} ${size}px "JetBrains Mono", monospace`;
  ctx.textAlign = align;
  ctx.fillText(str, x, y);
}

function formatScore(t) {
  // t in seconds → integer centiseconds, padded to 4 digits
  return String(Math.floor(t * 100)).padStart(4, '0');
}

let lastFrameTime = 0;
let hoverScale = 1;
let hoverTarget = 1;

const navLink = document.querySelector('.nav-link');
navLink.addEventListener('mouseenter', () => { hoverTarget = 1.4; });
navLink.addEventListener('mouseleave', () => { hoverTarget = 1; });

function frame(now) {
  const dt = lastFrameTime === 0 ? 1 : Math.min(3, (now - lastFrameTime) / (1000 / 144));
  lastFrameTime = now;

  if (rawX >= 0 && dx_ >= 0) {
    // inner dot: 1:1
    dx_ = rawX;
    dy_ = rawY;
    // outer ring: small frame-rate-independent easing
    const ringK = 1 - Math.pow(1 - 0.45, dt);
    rx += (rawX - rx) * ringK;
    ry += (rawY - ry) * ringK;
  }

  // smoothly scale cursor toward hover target
  const scaleK = 1 - Math.pow(1 - 0.25, dt);
  hoverScale += (hoverTarget - hoverScale) * scaleK;

  if (mode === 'idle' && inArena()) { mode = 'countdown'; tCountdown = now; }
  if (mode === 'countdown' && !inArena()) mode = 'idle';

  if (mode === 'memorize' && now - tMemorizeStart >= MEMORIZE_MS) {
    mode = 'recall';
    tRecallStart = now;
  }

  if (mode === 'countdown' && now - tCountdown >= 3000) {
    startGame();
  }

  // --- render ---
  ctx.fillStyle = BG;
  ctx.fillRect(0, 0, W, H);

  // BEST header
  text('BEST', ax + ARENA_SIZE / 2, ay - 44, 11, DIM, 400);
  text(best === 0 ? '----' : formatScore(best), ax + ARENA_SIZE / 2, ay - 16, 28, FG, 800);

  // arena border
  ctx.strokeStyle = FG;
  ctx.lineWidth = 1.5;
  ctx.strokeRect(ax, ay, ARENA_SIZE, ARENA_SIZE);

  const mx = ax + ARENA_SIZE / 2, my = ay + ARENA_SIZE / 2;

  if (mode === 'idle') {
    text('ENTER THE SQUARE', mx, my + 4, 13, DIM, 600);
  }

  if (mode === 'countdown') {
    const elapsed = now - tCountdown;
    if (elapsed < 3000) {
      text(Math.ceil((3000 - elapsed) / 1000), mx, my + 14, 80);
      text('CLICK TO SKIP', mx, my + 56, 11, DIM, 400);
    }
  }

  // memorize: show numbers + countdown
  if (mode === 'memorize') {
    const remaining = Math.max(0, MEMORIZE_MS - (now - tMemorizeStart));
    drawCircles(true);
    // small countdown above arena
    text('MEMORIZE', ax + ARENA_SIZE / 2, ay + ARENA_SIZE + 24, 11, DIM, 400);
    text((remaining / 1000).toFixed(1), ax + ARENA_SIZE / 2, ay + ARENA_SIZE + 48, 18, FG, 800);
  }

  // recall: blank circles + live timer
  if (mode === 'recall') {
    drawCircles(false);
    const elapsed = (now - tRecallStart) / 1000;
    text('TIME', ax + ARENA_SIZE / 2, ay + ARENA_SIZE + 24, 11, DIM, 400);
    text(formatScore(elapsed), ax + ARENA_SIZE / 2, ay + ARENA_SIZE + 48, 18, FG, 800);
  }

  if (mode === 'done') {
    text('CLEAR', mx, my - 14, 32);
    text(formatScore(finalTime), mx, my + 18, 18, FG, 600);
    text('CLICK TO RETRY', mx, my + 46, 11, DIM, 400);
  }

  if (mode === 'dead') {
    text('GAME OVER', mx, my - 14, 32);
    text('CLICK TO RETRY', mx, my + 22, 11, DIM, 400);
  }

  // cursor
  if (rx >= 0) {
    ctx.strokeStyle = FG;
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(rx, ry, RING_R * hoverScale, 0, Math.PI * 2);
    ctx.stroke();
  }
  if (dx_ >= 0) {
    ctx.fillStyle = FG;
    ctx.beginPath();
    ctx.arc(dx_, dy_, DOT_R * hoverScale, 0, Math.PI * 2);
    ctx.fill();
  }

  requestAnimationFrame(frame);
}

function drawCircles(showNumbers) {
  for (const c of circles) {
    const cleared = c.n < nextNumber;
    if (cleared) {
      // dim cleared circles
      ctx.strokeStyle = DIM;
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.arc(c.x, c.y, CIRCLE_R, 0, Math.PI * 2);
      ctx.stroke();
      continue;
    }

    ctx.fillStyle = BG;
    ctx.beginPath();
    ctx.arc(c.x, c.y, CIRCLE_R, 0, Math.PI * 2);
    ctx.fill();

    ctx.strokeStyle = FG;
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(c.x, c.y, CIRCLE_R, 0, Math.PI * 2);
    ctx.stroke();

    if (showNumbers) {
      text(String(c.n), c.x, c.y + 6, 16, FG, 800);
    }
  }
}

requestAnimationFrame(frame);
</script>
</body>
</html>
