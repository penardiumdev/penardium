<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Memory Arena</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; overflow: hidden; background: #1a1a1d; font-family: 'JetBrains Mono', monospace; cursor: none; }
  *, *::before, *::after { cursor: none !important; }
  canvas { display: block; position: fixed; inset: 0; }
  canvas#arena { cursor: none; }
  canvas#cursorLayer { pointer-events: none; z-index: 20; }
  .nav {
    position: fixed;
    top: 16px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 18px;
    align-items: center;
    z-index: 10;
    pointer-events: none;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 0.5px;
    white-space: nowrap;
  }
  .nav a, .nav span {
    color: #3d3d40;
    text-decoration: none;
    pointer-events: none;
    transition: color 0.15s;
  }
  .nav a.hover { color: #e8e8e6; }
  .nav .current { color: #6b6b68; }
  .nav .sep { color: #3d3d40; }

  .palette {
    position: fixed;
    top: 16px;
    right: 16px;
    z-index: 10;
    font-family: 'JetBrains Mono', monospace;
  }
  .palette-btn {
    background: transparent;
    border: 1.5px solid #3d3d40;
    color: #6b6b68;
    font-family: inherit;
    font-size: 10px;
    font-weight: 400;
    letter-spacing: 0.5px;
    padding: 6px 10px;
    cursor: none;
    transition: color 0.15s, border-color 0.15s;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .palette-btn:hover, .palette-btn.hover {
    color: #e8e8e6;
    border-color: #e8e8e6;
  }
  .palette-swatch {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #e8e8e6;
  }
  .palette-menu {
    position: absolute;
    top: 100%;
    right: 0;
    margin-top: 6px;
    background: #1a1a1d;
    border: 1.5px solid #3d3d40;
    padding: 8px;
    display: none;
    grid-template-columns: repeat(7, auto);
    gap: 6px;
  }
  .palette-menu.open { display: grid; }
  .palette-option {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    cursor: none;
    border: 1.5px solid transparent;
    transition: border-color 0.15s, transform 0.15s;
    padding: 0;
  }
  .palette-option:hover, .palette-option.hover {
    transform: scale(1.15);
  }
  .palette-option.selected {
    border-color: #e8e8e6;
  }
</style>
</head>
<body>
<nav class="nav">
  <a href="https://penardium.com/dodge-arena.html" data-game="dodge">DODGE ARENA</a>
  <span class="sep">·</span>
  <span class="current">MEMORY ARENA</span>
  <span class="sep">·</span>
  <a href="https://penardium.com/dribble-arena.html" data-game="dribble">ARENA DRIBBLER</a>
</nav>
<div class="palette">
  <button class="palette-btn" id="paletteBtn">
    <span class="palette-swatch" id="paletteSwatch"></span>
    <span>CURSOR</span>
  </button>
  <div class="palette-menu" id="paletteMenu"></div>
</div>
<canvas id="arena"></canvas>
<canvas id="cursorLayer"></canvas>
<script>
const canvas = document.getElementById('arena');
const ctx = canvas.getContext('2d');
const cursorCanvas = document.getElementById('cursorLayer');
const cctx = cursorCanvas.getContext('2d');

// --- config ---
const ARENA_SIZE = 300;
const DOT_R = 4;
const RING_R = 18;
const BG = '#1a1a1d', FG = '#e8e8e6', DIM = '#6b6b68';

// --- cursor color palette (shared across all 3 arenas via localStorage) ---
const PALETTE = [
  { name: 'DEFAULT', value: '#e8e8e6' },
  { name: 'RED',     value: '#e85d4a' },
  { name: 'AMBER',   value: '#e8a64a' },
  { name: 'LIME',    value: '#a8e84a' },
  { name: 'MINT',    value: '#4ae8b4' },
  { name: 'BLUE',    value: '#4aa6e8' },
  { name: 'VIOLET',  value: '#b44ae8' },
];
let cursorColor = localStorage.getItem('arenaCursorColor') || PALETTE[0].value;

const NUM_CIRCLES = 7;
const CIRCLE_R = 18;
const MIN_SPACING = 50; // center-to-center distance between circles
const MEMORIZE_MS = 5000;

// --- state ---
let W, H, ax, ay, DPR = 1;
let rawX = -1, rawY = -1;
let dx_ = -1, dy_ = -1;
let rx = -1, ry = -1;
let mode = 'idle'; // idle | countdown | memorize | recall | done | dead
let tCountdown = 0, tMemorizeStart = 0, tRecallStart = 0;
let circles = []; // {x, y, n}
let nextNumber = 1;
let finalTime = 0;
let best = parseFloat(localStorage.getItem('memoryArenaBest')) || 0; // 0 = no record yet

function resize() {
  DPR = devicePixelRatio || 1;
  W = innerWidth; H = innerHeight;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  canvas.width = W * DPR;
  canvas.height = H * DPR;
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  cursorCanvas.style.width = W + 'px';
  cursorCanvas.style.height = H + 'px';
  cursorCanvas.width = W * DPR;
  cursorCanvas.height = H * DPR;
  cctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  ax = (W - ARENA_SIZE) / 2;
  ay = (H - ARENA_SIZE) / 2;
}
addEventListener('resize', resize);
resize();

window.addEventListener('mousemove', e => {
  rawX = e.clientX; rawY = e.clientY;
  if (dx_ < 0) { dx_ = rawX; dy_ = rawY; rx = rawX; ry = rawY; }
});
canvas.addEventListener('contextmenu', e => e.preventDefault());

const inArena = () => rx >= ax && rx <= ax + ARENA_SIZE && ry >= ay && ry <= ay + ARENA_SIZE;

function generateCircles() {
  circles = [];
  const padding = CIRCLE_R + 4;
  let attempts = 0;
  while (circles.length < NUM_CIRCLES && attempts < 5000) {
    attempts++;
    const cx = ax + padding + Math.random() * (ARENA_SIZE - padding * 2);
    const cy = ay + padding + Math.random() * (ARENA_SIZE - padding * 2);
    let ok = true;
    for (const c of circles) {
      if (Math.hypot(cx - c.x, cy - c.y) < MIN_SPACING) { ok = false; break; }
    }
    if (ok) circles.push({ x: cx, y: cy, n: circles.length + 1 });
  }
}

function startGame() {
  generateCircles();
  nextNumber = 1;
  finalTime = 0;
  mode = 'memorize';
  tMemorizeStart = performance.now();
}

function gameOver() {
  finalTime = mode === 'recall' ? (performance.now() - tRecallStart) / 1000 : 0;
  mode = 'dead';
}

function finish(now) {
  finalTime = (now - tRecallStart) / 1000;
  if (best === 0 || finalTime < best) {
    best = finalTime;
    localStorage.setItem('memoryArenaBest', best);
  }
  mode = 'done';
}

canvas.addEventListener('click', (e) => {
  // palette UI swallows clicks too
  if (e.clientX >= paletteBtnRect.left && e.clientX <= paletteBtnRect.right
   && e.clientY >= paletteBtnRect.top && e.clientY <= paletteBtnRect.bottom) return;
  if (paletteOpen) {
    for (const { rect } of paletteOptionRects) {
      if (e.clientX >= rect.left && e.clientX <= rect.right
       && e.clientY >= rect.top && e.clientY <= rect.bottom) return;
    }
  }
  // nav links swallow the click
  for (let i = 0; i < navLinks.length; i++) {
    const r = navRects[i];
    if (e.clientX >= r.left && e.clientX <= r.right
     && e.clientY >= r.top && e.clientY <= r.bottom) {
      const href = navLinks[i].getAttribute('href');
      if (href) window.location.href = href;
      return;
    }
  }
  if (mode === 'countdown' && inArena()) {
    startGame();
    return;
  }
  if (mode === 'recall') {
    // check if click hit the next-numbered circle
    for (const c of circles) {
      if (c.n < nextNumber) continue; // already cleared
      if (Math.hypot(dx_ - c.x, dy_ - c.y) < CIRCLE_R) {
        if (c.n === nextNumber) {
          nextNumber++;
          if (nextNumber > NUM_CIRCLES) finish(performance.now());
        } else {
          gameOver();
        }
        return;
      }
    }
    // empty click: ignored
    return;
  }
  if (mode === 'dead' || mode === 'done') {
    mode = 'idle';
    circles = [];
    nextNumber = 1;
  }
});

function text(str, x, y, size, color = FG, weight = 800, align = 'center') {
  ctx.fillStyle = color;
  ctx.font = `${weight} ${size}px "JetBrains Mono", monospace`;
  ctx.textAlign = align;
  ctx.fillText(str, x, y);
}

function formatScore(t) {
  // t in seconds → 100 points per second for precision (e.g. 3.02s = 302)
  return String(Math.floor(t * 100));
}

let lastFrameTime = 0;
let hoverScale = 1;
let hoverTarget = 1;

const navLinks = [...document.querySelectorAll('.nav a')];
let navRects = navLinks.map(el => el.getBoundingClientRect());
const refreshNavRects = () => { navRects = navLinks.map(el => el.getBoundingClientRect()); };
addEventListener('resize', refreshNavRects);

// --- palette menu setup ---
const paletteBtn = document.getElementById('paletteBtn');
const paletteMenu = document.getElementById('paletteMenu');
const paletteSwatch = document.getElementById('paletteSwatch');
let paletteOpen = false;

PALETTE.forEach(p => {
  const opt = document.createElement('button');
  opt.className = 'palette-option';
  opt.style.background = p.value;
  opt.dataset.color = p.value;
  opt.title = p.name;
  if (p.value === cursorColor) opt.classList.add('selected');
  opt.addEventListener('click', (e) => {
    e.stopPropagation();
    cursorColor = p.value;
    localStorage.setItem('arenaCursorColor', cursorColor);
    paletteSwatch.style.background = cursorColor;
    [...paletteMenu.children].forEach(c => c.classList.toggle('selected', c.dataset.color === cursorColor));
    paletteMenu.classList.remove('open');
    paletteOpen = false;
    refreshPaletteRects();
  });
  paletteMenu.appendChild(opt);
});
paletteSwatch.style.background = cursorColor;

paletteBtn.addEventListener('click', (e) => {
  e.stopPropagation();
  paletteOpen = !paletteOpen;
  paletteMenu.classList.toggle('open', paletteOpen);
  refreshPaletteRects();
});
addEventListener('click', () => {
  if (paletteOpen) {
    paletteOpen = false;
    paletteMenu.classList.remove('open');
    refreshPaletteRects();
  }
});

let paletteBtnRect = paletteBtn.getBoundingClientRect();
let paletteOptionRects = [];
const refreshPaletteRects = () => {
  paletteBtnRect = paletteBtn.getBoundingClientRect();
  paletteOptionRects = [...paletteMenu.children].map(el => ({
    el, rect: el.getBoundingClientRect()
  }));
};
addEventListener('resize', refreshPaletteRects);
refreshPaletteRects();

window.addEventListener('mousemove', e => {
  let anyHover = false;
  for (let i = 0; i < navLinks.length; i++) {
    const r = navRects[i];
    const inside = e.clientX >= r.left && e.clientX <= r.right
                && e.clientY >= r.top && e.clientY <= r.bottom;
    if (inside) {
      navLinks[i].classList.add('hover');
      anyHover = true;
    } else {
      navLinks[i].classList.remove('hover');
    }
  }
  hoverTarget = anyHover ? 1.4 : 1;
});

function frame(now) {
  const dt = lastFrameTime === 0 ? 1 : Math.min(3, (now - lastFrameTime) / (1000 / 144));
  lastFrameTime = now;

  if (rawX >= 0 && dx_ >= 0) {
    // inner dot: 1:1
    dx_ = rawX;
    dy_ = rawY;
    // outer ring: small frame-rate-independent easing
    const ringK = 1 - Math.pow(1 - 0.45, dt);
    rx += (rawX - rx) * ringK;
    ry += (rawY - ry) * ringK;
  }

  // smoothly scale cursor toward hover target
  const scaleK = 1 - Math.pow(1 - 0.25, dt);
  hoverScale += (hoverTarget - hoverScale) * scaleK;

  if (mode === 'idle' && inArena()) { mode = 'countdown'; tCountdown = now; }
  if (mode === 'countdown' && !inArena()) mode = 'idle';
  if ((mode === 'memorize' || mode === 'recall') && !inArena()) gameOver();

  if (mode === 'memorize' && now - tMemorizeStart >= MEMORIZE_MS) {
    mode = 'recall';
    tRecallStart = now;
  }

  if (mode === 'countdown' && now - tCountdown >= 3000) {
    startGame();
  }

  // --- render ---
  ctx.fillStyle = BG;
  ctx.fillRect(0, 0, W, H);

  // BEST header
  text('BEST', ax + ARENA_SIZE / 2, ay - 44, 11, DIM, 400);
  text(best === 0 ? '---' : formatScore(best), ax + ARENA_SIZE / 2, ay - 16, 28, FG, 800);

  // arena border
  ctx.strokeStyle = FG;
  ctx.lineWidth = 1.5;
  ctx.strokeRect(ax, ay, ARENA_SIZE, ARENA_SIZE);

  const mx = ax + ARENA_SIZE / 2, my = ay + ARENA_SIZE / 2;

  if (mode === 'idle') {
    text('ENTER THE SQUARE', mx, my + 4, 13, DIM, 600);
  }

  if (mode === 'countdown') {
    const elapsed = now - tCountdown;
    if (elapsed < 3000) {
      text(Math.ceil((3000 - elapsed) / 1000), mx, my + 14, 80);
      text('CLICK TO SKIP', mx, my + 56, 11, DIM, 400);
    }
  }

  // memorize: show numbers + big countdown watermark
  if (mode === 'memorize') {
    const remaining = Math.max(0, MEMORIZE_MS - (now - tMemorizeStart));
    text(Math.ceil(remaining / 1000), mx, my + 40, 120, 'rgba(232,232,230,0.06)');
    drawCircles(true);
  }

  // recall: blank circles + live timer watermark
  if (mode === 'recall') {
    const elapsed = (now - tRecallStart) / 1000;
    text(formatScore(elapsed), mx, my + 40, 120, 'rgba(232,232,230,0.06)');
    drawCircles(false);
  }

  if (mode === 'done') {
    text('CLEAR', mx, my - 14, 32);
    text(formatScore(finalTime), mx, my + 18, 18, FG, 600);
    text('CLICK TO RETRY', mx, my + 46, 11, DIM, 400);
  }

  if (mode === 'dead') {
    text('GAME OVER', mx, my - 14, 32);
    text(formatScore(finalTime), mx, my + 18, 18, FG, 600);
    text('CLICK TO RETRY', mx, my + 46, 11, DIM, 400);
  }

  // --- cursor layer (rendered on top of all DOM UI) ---
  cctx.clearRect(0, 0, W, H);
  // cursor
  if (rx >= 0) {
    cctx.strokeStyle = cursorColor;
    cctx.lineWidth = 1.5;
    cctx.beginPath();
    cctx.arc(rx, ry, RING_R * hoverScale, 0, Math.PI * 2);
    cctx.stroke();
  }
  if (dx_ >= 0) {
    cctx.fillStyle = cursorColor;
    cctx.beginPath();
    cctx.arc(dx_, dy_, DOT_R * hoverScale, 0, Math.PI * 2);
    cctx.fill();
  }

  requestAnimationFrame(frame);
}

function drawCircles(showNumbers) {
  for (const c of circles) {
    const cleared = c.n < nextNumber;
    if (cleared) {
      // dim cleared circles
      ctx.strokeStyle = DIM;
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.arc(c.x, c.y, CIRCLE_R, 0, Math.PI * 2);
      ctx.stroke();
      continue;
    }

    ctx.fillStyle = BG;
    ctx.beginPath();
    ctx.arc(c.x, c.y, CIRCLE_R, 0, Math.PI * 2);
    ctx.fill();

    ctx.strokeStyle = FG;
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(c.x, c.y, CIRCLE_R, 0, Math.PI * 2);
    ctx.stroke();

    if (showNumbers) {
      text(String(c.n), c.x, c.y + 6, 16, FG, 800);
    }
  }
}

requestAnimationFrame(frame);
</script>
</body>
</html>
