<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Arena Dribbler</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; overflow: hidden; background: #1a1a1d; font-family: 'JetBrains Mono', monospace; }
  canvas { display: block; cursor: none; position: fixed; inset: 0; }
  .nav {
    position: fixed;
    top: 16px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 18px;
    align-items: center;
    z-index: 10;
    pointer-events: none;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 0.5px;
    white-space: nowrap;
  }
  .nav a, .nav span {
    color: #3d3d40;
    text-decoration: none;
    pointer-events: none;
    transition: color 0.15s;
  }
  .nav a.hover { color: #e8e8e6; }
  .nav .current { color: #6b6b68; }
  .nav .sep { color: #3d3d40; }
</style>
</head>
<body>
<nav class="nav">
  <a href="https://penardium.com/dodge-arena.html" data-game="dodge">DODGE ARENA</a>
  <span class="sep">·</span>
  <span class="current">ARENA DRIBBLER</span>
  <span class="sep">·</span>
  <a href="https://penardium.com/memory-arena.html" data-game="memory">MEMORY ARENA</a>
</nav>
<canvas id="arena"></canvas>
<script>
const canvas = document.getElementById('arena');
const ctx = canvas.getContext('2d');

// --- config ---
const ARENA_SIZE = 300;
const DOT_R = 4;
const RING_R = 18;
const DOT_EASE = 0.22;
const RING_EASE = 0.16;
const BG = '#1a1a1d', FG = '#e8e8e6', DIM = '#6b6b68';

const BALL_R = 9;
const GRAVITY = 0.045;          // per (1/144)s frame at dt=1
const AIR_DRAG = 0.0015;        // per frame
const WALL_BOUNCE = 0.78;       // energy retained on wall hit
const KICK_BASE_UP = 3.8;       // baseline upward impulse on every kick
const KICK_VEL_GAIN = 0.4;      // how much cursor velocity transfers
const KICK_MAX_SPEED = 16;      // cap so frantic flicks don't yeet the ball
const KICK_COOLDOWN_MS = 120;   // refractory period before ring can kick again
const SPIN_FROM_VEL = 0.012;

// --- state ---
let W, H, ax, ay, DPR = 1;
let rawX = -1, rawY = -1;
let dx_ = -1, dy_ = -1;          // inner dot (smoothed)
let rx = -1, ry = -1;            // outer ring (kicker)
let prevRx = -1, prevRy = -1;    // for cursor velocity
let cursorVx = 0, cursorVy = 0;
let mode = 'idle';
let tCountdown = 0, tStart = 0, tLastKick = -9999;
let ball = null;
let score = 0;                   // current kick count
let best = parseInt(localStorage.getItem('arenaDribblerBest')) || 0;
let cursorTrail = [];
let lastFrameTime = 0;
let hoverScale = 1;
let hoverTarget = 1;
let kickPulse = 0;               // 0..1, fades after a kick
let particles = [];
let ballRotation = 0;
let ballSpin = 0;

function resize() {
  DPR = devicePixelRatio || 1;
  W = innerWidth; H = innerHeight;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  canvas.width = W * DPR;
  canvas.height = H * DPR;
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  ax = (W - ARENA_SIZE) / 2;
  ay = (H - ARENA_SIZE) / 2;
}
addEventListener('resize', resize);
resize();

canvas.addEventListener('mousemove', e => {
  rawX = e.clientX; rawY = e.clientY;
  if (dx_ < 0) { dx_ = rawX; dy_ = rawY; rx = rawX; ry = rawY; prevRx = rawX; prevRy = rawY; }
});
canvas.addEventListener('contextmenu', e => e.preventDefault());

const navLinks = [...document.querySelectorAll('.nav a')];
let navRects = navLinks.map(el => el.getBoundingClientRect());
const refreshNavRects = () => { navRects = navLinks.map(el => el.getBoundingClientRect()); };
addEventListener('resize', refreshNavRects);

canvas.addEventListener('mousemove', e => {
  let anyHover = false;
  for (let i = 0; i < navLinks.length; i++) {
    const r = navRects[i];
    const inside = e.clientX >= r.left && e.clientX <= r.right
                && e.clientY >= r.top && e.clientY <= r.bottom;
    if (inside) {
      navLinks[i].classList.add('hover');
      anyHover = true;
    } else {
      navLinks[i].classList.remove('hover');
    }
  }
  hoverTarget = anyHover ? 1.4 : 1;
});

canvas.addEventListener('click', (e) => {
  // check nav links first — they swallow the click
  for (let i = 0; i < navLinks.length; i++) {
    const r = navRects[i];
    if (e.clientX >= r.left && e.clientX <= r.right
     && e.clientY >= r.top && e.clientY <= r.bottom) {
      const href = navLinks[i].getAttribute('href');
      if (href) window.location.href = href;
      return;
    }
  }
  if (mode === 'countdown' && inArena()) {
    startGame();
  } else if (mode === 'dead') {
    mode = 'idle';
    score = 0;
    ball = null;
    particles = [];
    cursorTrail = [];
    kickPulse = 0;
  }
});

const inArena = () => rx >= ax && rx <= ax + ARENA_SIZE && ry >= ay && ry <= ay + ARENA_SIZE;

function startGame() {
  mode = 'playing';
  tStart = performance.now();
  score = 0;
  // spawn ball at top-center, slight horizontal nudge so it's not boring
  ball = {
    x: ax + ARENA_SIZE / 2 + (Math.random() - 0.5) * 60,
    y: ay + 40,
    vx: (Math.random() - 0.5) * 1.5,
    vy: 0,
  };
  ballRotation = 0;
  ballSpin = 0;
  particles = [];
}

function gameOver() {
  mode = 'dead';
  if (score > best) {
    best = score;
    localStorage.setItem('arenaDribblerBest', best);
  }
}

function spawnKickParticles(x, y, dirX, dirY) {
  const count = 8;
  for (let i = 0; i < count; i++) {
    const ang = Math.atan2(dirY, dirX) + (Math.random() - 0.5) * 1.6;
    const sp = 1.5 + Math.random() * 2.5;
    particles.push({
      x, y,
      vx: Math.cos(ang) * sp,
      vy: Math.sin(ang) * sp,
      life: 1,
      decay: 0.04 + Math.random() * 0.03,
    });
  }
}

function tryKick(now) {
  if (!ball) return;
  if (now - tLastKick < KICK_COOLDOWN_MS) return;
  const dxb = ball.x - rx, dyb = ball.y - ry;
  const dist = Math.hypot(dxb, dyb);
  if (dist > RING_R + BALL_R) return;

  // direction from cursor center to ball — this is the natural push direction
  const nx = dxb / (dist || 1);
  const ny = dyb / (dist || 1);

  // cursor speed feeds into kick power
  const cSpeed = Math.hypot(cursorVx, cursorVy);

  // Impulse: a baseline upward kick + cursor velocity transfer + push along contact normal
  // Mix the cursor's velocity direction with the contact normal so flicks feel natural
  // but the ball never tunnels into the ring.
  const velPart = Math.min(cSpeed, KICK_MAX_SPEED) * KICK_VEL_GAIN;
  const normalPart = 1.6;

  let kvx = cursorVx * KICK_VEL_GAIN + nx * normalPart;
  let kvy = cursorVy * KICK_VEL_GAIN + ny * normalPart - KICK_BASE_UP;

  // cap final speed so it never feels broken
  const kspd = Math.hypot(kvx, kvy);
  const KMAX = 13;
  if (kspd > KMAX) { kvx = kvx / kspd * KMAX; kvy = kvy / kspd * KMAX; }

  ball.vx = kvx;
  ball.vy = kvy;

  // resolve overlap so we're not stuck inside ring
  const minD = RING_R + BALL_R + 0.5;
  ball.x = rx + nx * minD;
  ball.y = ry + ny * minD;

  // spin influenced by cursor's tangential velocity
  ballSpin = (cursorVx * ny - cursorVy * nx) * SPIN_FROM_VEL;

  tLastKick = now;
  score += 1;
  kickPulse = 1;
  spawnKickParticles(ball.x, ball.y, kvx, kvy);
}

function text(str, x, y, size, color = FG, weight = 800, align = 'center') {
  ctx.fillStyle = color;
  ctx.font = `${weight} ${size}px "JetBrains Mono", monospace`;
  ctx.textAlign = align;
  ctx.fillText(str, x, y);
}

function drawBall(b) {
  const grad = ctx.createRadialGradient(
    b.x - BALL_R * 0.4, b.y - BALL_R * 0.5, 0,
    b.x, b.y, BALL_R
  );
  grad.addColorStop(0, 'rgba(255,255,255,1)');
  grad.addColorStop(0.65, 'rgba(232,232,230,1)');
  grad.addColorStop(1, 'rgba(140,140,140,1)');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(b.x, b.y, BALL_R, 0, Math.PI * 2);
  ctx.fill();

  // subtle rotating tick mark to show spin
  ctx.save();
  ctx.translate(b.x, b.y);
  ctx.rotate(ballRotation);
  ctx.strokeStyle = 'rgba(80,80,80,0.55)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(-BALL_R * 0.6, 0);
  ctx.lineTo(BALL_R * 0.6, 0);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(0, -BALL_R * 0.6);
  ctx.lineTo(0, BALL_R * 0.6);
  ctx.stroke();
  ctx.restore();
}

function frame(now) {
  const dt = lastFrameTime === 0 ? 1 : Math.min(3, (now - lastFrameTime) / (1000 / 144));
  lastFrameTime = now;

  if (rawX >= 0 && dx_ >= 0) {
    const dotK = 1 - Math.pow(1 - DOT_EASE, dt);
    const ringK = 1 - Math.pow(1 - RING_EASE, dt);
    prevRx = rx; prevRy = ry;
    dx_ += (rawX - dx_) * dotK;
    dy_ += (rawY - dy_) * dotK;
    rx += (rawX - rx) * ringK;
    ry += (rawY - ry) * ringK;
    // cursor velocity in px per (1/144)s frame
    if (dt > 0) {
      cursorVx = (rx - prevRx) / dt;
      cursorVy = (ry - prevRy) / dt;
    }
  }

  const scaleK = 1 - Math.pow(1 - 0.25, dt);
  hoverScale += (hoverTarget - hoverScale) * scaleK;
  kickPulse *= Math.pow(0.88, dt);

  if (mode === 'idle' && inArena()) { mode = 'countdown'; tCountdown = now; }
  if (mode === 'countdown' && !inArena()) mode = 'idle';
  if (mode === 'playing' && !inArena()) gameOver();

  // ball physics
  if (mode === 'playing' && ball) {
    ball.vy += GRAVITY * dt;
    // air drag (mild, scales with velocity)
    ball.vx -= ball.vx * AIR_DRAG * dt;
    ball.vy -= ball.vy * AIR_DRAG * dt;
    ball.x += ball.vx * dt;
    ball.y += ball.vy * dt;
    ballRotation += ballSpin * dt;
    ballSpin *= Math.pow(0.99, dt);

    // walls: left/right/top bounce
    if (ball.x - BALL_R < ax) {
      ball.x = ax + BALL_R;
      ball.vx = -ball.vx * WALL_BOUNCE;
    } else if (ball.x + BALL_R > ax + ARENA_SIZE) {
      ball.x = ax + ARENA_SIZE - BALL_R;
      ball.vx = -ball.vx * WALL_BOUNCE;
    }
    if (ball.y - BALL_R < ay) {
      ball.y = ay + BALL_R;
      ball.vy = -ball.vy * WALL_BOUNCE;
    }

    // floor = death
    if (ball.y + BALL_R >= ay + ARENA_SIZE) {
      ball.y = ay + ARENA_SIZE - BALL_R;
      gameOver();
    }

    // kick check
    tryKick(now);
  }

  // particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vy += 0.05 * dt;
    p.life -= p.decay * dt;
    if (p.life <= 0) particles.splice(i, 1);
  }

  // cursor trail (always on while playing)
  if (mode === 'playing' && dx_ >= 0) {
    cursorTrail.push({ x: dx_, y: dy_ });
    if (cursorTrail.length > 14) cursorTrail.shift();
  } else if (mode !== 'playing' && cursorTrail.length) {
    cursorTrail = [];
  }

  if (mode === 'countdown' && now - tCountdown >= 3000) {
    startGame();
  }

  // --- render ---
  ctx.fillStyle = BG;
  ctx.fillRect(0, 0, W, H);

  text('BEST', ax + ARENA_SIZE / 2, ay - 44, 11, DIM, 400);
  text(String(best).padStart(4, '0'), ax + ARENA_SIZE / 2, ay - 16, 28, FG, 800);

  ctx.strokeStyle = FG;
  ctx.lineWidth = 1.5;
  ctx.strokeRect(ax, ay, ARENA_SIZE, ARENA_SIZE);

  const mx = ax + ARENA_SIZE / 2, my = ay + ARENA_SIZE / 2;

  if (mode === 'idle') {
    text('ENTER THE SQUARE', mx, my + 4, 13, DIM, 600);
    text('KEEP THE BALL UP', mx, my + 24, 11, DIM, 400);
  }

  if (mode === 'countdown') {
    const elapsed = now - tCountdown;
    if (elapsed < 3000) {
      text(Math.ceil((3000 - elapsed) / 1000), mx, my + 14, 80);
      text('CLICK TO SKIP', mx, my + 56, 11, DIM, 400);
    }
  }

  if (mode === 'playing') {
    text(score, mx, my + 40, 120, 'rgba(232,232,230,0.06)');
  }

  // ball
  if (ball && (mode === 'playing' || mode === 'dead')) {
    drawBall(ball);
  }

  // particles
  for (const p of particles) {
    const a = Math.max(0, p.life);
    ctx.fillStyle = `rgba(232,232,230,${a})`;
    ctx.beginPath();
    ctx.arc(p.x, p.y, 1.6, 0, Math.PI * 2);
    ctx.fill();
  }

  if (mode === 'dead') {
    text('GAME OVER', mx, my - 14, 32);
    text(String(score).padStart(4, '0') + '  KICKS', mx, my + 18, 13, FG, 600);
    text('CLICK TO RETRY', mx, my + 46, 11, DIM, 400);
  }

  // cursor: ring + inner dot
  if (rx >= 0) {
    const pulseR = RING_R * hoverScale + kickPulse * 8;
    ctx.strokeStyle = `rgba(232,232,230,${1 - kickPulse * 0.4})`;
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(rx, ry, pulseR, 0, Math.PI * 2);
    ctx.stroke();

    // expanding shockwave on kick
    if (kickPulse > 0.05) {
      ctx.strokeStyle = `rgba(232,232,230,${kickPulse * 0.5})`;
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.arc(rx, ry, RING_R + (1 - kickPulse) * 28, 0, Math.PI * 2);
      ctx.stroke();
    }
  }

  // cursor trail
  if (cursorTrail.length >= 2) {
    for (let i = 1; i < cursorTrail.length; i++) {
      const a = (i / cursorTrail.length) * 0.45;
      ctx.strokeStyle = `rgba(232,232,230,${a})`;
      ctx.lineWidth = DOT_R * (i / cursorTrail.length) * 1.3;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(cursorTrail[i-1].x, cursorTrail[i-1].y);
      ctx.lineTo(cursorTrail[i].x, cursorTrail[i].y);
      ctx.stroke();
    }
  }

  if (dx_ >= 0) {
    ctx.fillStyle = FG;
    ctx.beginPath();
    ctx.arc(dx_, dy_, DOT_R * hoverScale, 0, Math.PI * 2);
    ctx.fill();
  }

  requestAnimationFrame(frame);
}

requestAnimationFrame(frame);
</script>
</body>
</html>
