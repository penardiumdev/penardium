<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Memory Arena</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; overflow: hidden; background: #1a1a1d; font-family: "Archivo Black", sans-serif; cursor: none; }
  *, *::before, *::after { cursor: none !important; }
  canvas { display: block; position: fixed; inset: 0; }
  canvas#arena { cursor: none; }
  canvas#cursorLayer { pointer-events: none; z-index: 20; }
</style>
</head>
<body>
<canvas id="arena"></canvas>
<canvas id="cursorLayer"></canvas>
<script src="nav.js"></script>
<script src="sound.js"></script>
<script>
const canvas = document.getElementById('arena');
const ctx = canvas.getContext('2d');
const cursorCanvas = document.getElementById('cursorLayer');
const cctx = cursorCanvas.getContext('2d');

// offscreen canvas used for the frosted-glass blur over the arena interior
const blurCanvas = document.createElement('canvas');
const bctx = blurCanvas.getContext('2d');

// --- config ---
const ARENA_SIZE = 300;
const DOT_R = 4;
const RING_R = 18;
const BG = '#1a1a1d', FG = '#e8e8e6', DIM = '#6b6b68';

// Cursor color is owned by the shared nav (window.GameNav). We re-read it
// at the top of each frame so swatch changes propagate without a reload.
let cursorColor = (window.GameNav && window.GameNav.getCursorColor()) || '#e8e8e6';

const NUM_CIRCLES = 7;
const CIRCLE_R = 18;
const MIN_SPACING = 50; // center-to-center distance between circles
const MEMORIZE_MS = 5000;

// --- state ---
let W, H, ax, ay, DPR = 1;
let rawX = -1, rawY = -1;
let dx_ = -1, dy_ = -1;
let rx = -1, ry = -1;
let mode = 'idle'; // idle | countdown | memorize | recall | done | dead
let tCountdown = 0, tMemorizeStart = 0, tRecallStart = 0;
let circles = []; // {x, y, n}
let nextNumber = 1;
let finalTime = 0;
let best = parseFloat(localStorage.getItem('memoryArenaBest')) || 0; // 0 = no record yet

function resize() {
  DPR = devicePixelRatio || 1;
  W = innerWidth; H = innerHeight;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  canvas.width = W * DPR;
  canvas.height = H * DPR;
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  cursorCanvas.style.width = W + 'px';
  cursorCanvas.style.height = H + 'px';
  cursorCanvas.width = W * DPR;
  cursorCanvas.height = H * DPR;
  cctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  // blur canvas sized to the arena region (with margin so blur edges don't clip)
  const blurMargin = 40;
  blurCanvas.width = (ARENA_SIZE + blurMargin * 2) * DPR;
  blurCanvas.height = (ARENA_SIZE + blurMargin * 2) * DPR;
  bctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  ax = (W - ARENA_SIZE) / 2;
  ay = (H - ARENA_SIZE) / 2;
}
addEventListener('resize', resize);
resize();

window.addEventListener('mousemove', e => {
  rawX = e.clientX; rawY = e.clientY;
  if (dx_ < 0) { dx_ = rawX; dy_ = rawY; rx = rawX; ry = rawY; }
});
canvas.addEventListener('contextmenu', e => e.preventDefault());

const inArena = () => rx >= ax && rx <= ax + ARENA_SIZE && ry >= ay && ry <= ay + ARENA_SIZE;

function generateCircles() {
  circles = [];
  const padding = CIRCLE_R + 4;
  let attempts = 0;
  while (circles.length < NUM_CIRCLES && attempts < 5000) {
    attempts++;
    const cx = ax + padding + Math.random() * (ARENA_SIZE - padding * 2);
    const cy = ay + padding + Math.random() * (ARENA_SIZE - padding * 2);
    let ok = true;
    for (const c of circles) {
      if (Math.hypot(cx - c.x, cy - c.y) < MIN_SPACING) { ok = false; break; }
    }
    if (ok) circles.push({ x: cx, y: cy, n: circles.length + 1 });
  }
}

function startGame() {
  generateCircles();
  nextNumber = 1;
  finalTime = 0;
  mode = 'memorize';
  tMemorizeStart = performance.now();
  Sound.start();
}

function gameOver() {
  finalTime = mode === 'recall' ? (performance.now() - tRecallStart) / 1000 : 0;
  mode = 'dead';
  Sound.fail();
}

function finish(now) {
  finalTime = (now - tRecallStart) / 1000;
  if (best === 0 || finalTime < best) {
    best = finalTime;
    localStorage.setItem('memoryArenaBest', best);
  }
  mode = 'done';
  Sound.win();
}

canvas.addEventListener('click', (e) => {
  // nav swallows clicks (and navigates if a menu item was clicked, or
  // toggles a setting in the right-side menu)
  if (window.GameNav.handleClick(e.clientX, e.clientY)) return;
  if (mode === 'countdown' && inArena()) {
    startGame();
    return;
  }
  if (mode === 'recall') {
    // check if click hit the next-numbered circle
    for (const c of circles) {
      if (c.n < nextNumber) continue; // already cleared
      if (Math.hypot(dx_ - c.x, dy_ - c.y) < CIRCLE_R) {
        if (c.n === nextNumber) {
          Sound.pop(nextNumber - 1);
          nextNumber++;
          if (nextNumber > NUM_CIRCLES) finish(performance.now());
        } else {
          gameOver();
        }
        return;
      }
    }
    // empty click: ignored
    return;
  }
  if (mode === 'dead' || mode === 'done') {
    mode = 'idle';
    circles = [];
    nextNumber = 1;
  }
});

function text(str, x, y, size, color = FG, weight = 800, align = 'center') {
  ctx.fillStyle = color;
  ctx.font = `${weight} ${size}px "Archivo Black", sans-serif`;
  ctx.textAlign = align;
  ctx.fillText(str, x, y);
}

function drawBackground(now) {
  // Background blobs + vignette are painted by the shell (index.html) when
  // this page is loaded inside the iframe; clearing keeps the canvas
  // transparent so the shell shows through. Standalone visits fall back to
  // the dark body background.
  ctx.clearRect(0, 0, W, H);
}

function formatScore(t) {
  // t in seconds → 100 points per second for precision (e.g. 3.02s = 302)
  return String(Math.floor(t * 100));
}

let lastFrameTime = 0;
let hoverScale = 1;
let hoverTarget = 1;

window.addEventListener('mousemove', e => {
  const navHover = window.GameNav.updateHover(e.clientX, e.clientY);
  hoverTarget = navHover ? 1.4 : 1;
});

function frame(now) {
  const dt = lastFrameTime === 0 ? 1 : Math.min(3, (now - lastFrameTime) / (1000 / 144));
  lastFrameTime = now;
  cursorColor = (window.GameNav && window.GameNav.getCursorColor()) || cursorColor;

  if (rawX >= 0 && dx_ >= 0) {
    // inner dot: 1:1
    dx_ = rawX;
    dy_ = rawY;
    // outer ring: small frame-rate-independent easing
    const ringK = 1 - Math.pow(1 - 0.45, dt);
    rx += (rawX - rx) * ringK;
    ry += (rawY - ry) * ringK;
  }

  // smoothly scale cursor toward hover target
  const scaleK = 1 - Math.pow(1 - 0.25, dt);
  hoverScale += (hoverTarget - hoverScale) * scaleK;

  if (mode === 'idle' && inArena()) { mode = 'countdown'; tCountdown = now; }
  if (mode === 'countdown' && !inArena()) mode = 'idle';
  if ((mode === 'memorize' || mode === 'recall') && !inArena()) gameOver();

  if (mode === 'memorize' && now - tMemorizeStart >= MEMORIZE_MS) {
    mode = 'recall';
    tRecallStart = now;
  }

  if (mode === 'countdown' && now - tCountdown >= 3000) {
    startGame();
  }

  // --- render ---
  drawBackground(now);

  // BEST header
  text('BEST', ax + ARENA_SIZE / 2, ay - 44, 11, DIM, 400);
  text(best === 0 ? '---' : formatScore(best), ax + ARENA_SIZE / 2, ay - 16, 28, FG, 800);

  // arena interior — frosted-glass effect
  const blurMargin = 40;
  const sx = ax - blurMargin, sy = ay - blurMargin;
  const sw = ARENA_SIZE + blurMargin * 2, sh = ARENA_SIZE + blurMargin * 2;
  bctx.clearRect(0, 0, sw, sh);
  bctx.drawImage(canvas, sx * DPR, sy * DPR, sw * DPR, sh * DPR, 0, 0, sw, sh);
  ctx.save();
  ctx.beginPath();
  ctx.rect(ax, ay, ARENA_SIZE, ARENA_SIZE);
  ctx.clip();
  ctx.filter = 'blur(18px)';
  ctx.drawImage(blurCanvas, 0, 0, sw * DPR, sh * DPR, sx, sy, sw, sh);
  ctx.filter = 'none';
  ctx.fillStyle = 'rgba(20,20,23,0.45)';
  ctx.fillRect(ax, ay, ARENA_SIZE, ARENA_SIZE);
  ctx.restore();

  // arena border
  ctx.strokeStyle = FG;
  ctx.lineWidth = 1.5;
  ctx.strokeRect(ax, ay, ARENA_SIZE, ARENA_SIZE);

  const mx = ax + ARENA_SIZE / 2, my = ay + ARENA_SIZE / 2;

  if (mode === 'idle') {
    text('ENTER THE SQUARE', mx, my + 4, 13, DIM, 600);
  }

  if (mode === 'countdown') {
    const elapsed = now - tCountdown;
    if (elapsed < 3000) {
      text(Math.ceil((3000 - elapsed) / 1000), mx, my + 14, 80);
      text('CLICK TO SKIP', mx, my + 56, 11, DIM, 400);
    }
  }

  // memorize: show numbers + big countdown watermark
  if (mode === 'memorize') {
    const remaining = Math.max(0, MEMORIZE_MS - (now - tMemorizeStart));
    text(Math.ceil(remaining / 1000), mx, my + 40, 120, 'rgba(232,232,230,0.06)');
    drawCircles(true);
  }

  // recall: blank circles + live timer watermark
  if (mode === 'recall') {
    const elapsed = (now - tRecallStart) / 1000;
    text(formatScore(elapsed), mx, my + 40, 120, 'rgba(232,232,230,0.06)');
    drawCircles(false);
  }

  if (mode === 'done') {
    text('CLEAR', mx, my - 14, 32);
    text(formatScore(finalTime), mx, my + 18, 18, FG, 600);
    text('CLICK TO RETRY', mx, my + 46, 11, DIM, 400);
  }

  if (mode === 'dead') {
    text('GAME OVER', mx, my - 14, 32);
    text('SCORE ' + formatScore(finalTime), mx, my + 18, 18, FG, 600);
    text('CLICK TO RETRY', mx, my + 46, 11, DIM, 400);
  }

  // --- cursor layer (rendered on top of all DOM UI) ---
  cctx.clearRect(0, 0, W, H);
  // cursor
  if (rx >= 0) {
    cctx.strokeStyle = cursorColor;
    cctx.lineWidth = 1.5;
    cctx.beginPath();
    cctx.arc(rx, ry, RING_R * hoverScale, 0, Math.PI * 2);
    cctx.stroke();
  }
  if (dx_ >= 0) {
    cctx.fillStyle = cursorColor;
    cctx.beginPath();
    cctx.arc(dx_, dy_, DOT_R * hoverScale, 0, Math.PI * 2);
    cctx.fill();
  }

  requestAnimationFrame(frame);
}

function drawCircles(showNumbers) {
  for (const c of circles) {
    const cleared = c.n < nextNumber;
    if (cleared) {
      // dim cleared circles
      ctx.strokeStyle = DIM;
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.arc(c.x, c.y, CIRCLE_R, 0, Math.PI * 2);
      ctx.stroke();
      continue;
    }

    ctx.fillStyle = BG;
    ctx.beginPath();
    ctx.arc(c.x, c.y, CIRCLE_R, 0, Math.PI * 2);
    ctx.fill();

    ctx.strokeStyle = FG;
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(c.x, c.y, CIRCLE_R, 0, Math.PI * 2);
    ctx.stroke();

    if (showNumbers) {
      text(String(c.n), c.x, c.y + 6, 16, FG, 800);
    }
  }
}

requestAnimationFrame(frame);
</script>
</body>
</html>
